<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="globe" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ff8c5a"/>
      <stop offset="100%" stop-color="#cc3a10"/>
    </radialGradient>
  </defs>
  <!-- Globe circle -->
  <circle cx="32" cy="32" r="28" fill="url(#globe)"/>
  <!-- Latitude lines -->
  <ellipse cx="32" cy="32" rx="28" ry="10" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
  <ellipse cx="32" cy="22" rx="22" ry="7" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1.2"/>
  <ellipse cx="32" cy="42" rx="22" ry="7" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1.2"/>
  <!-- Longitude line (vertical) -->
  <path d="M32 4 Q44 18 44 32 Q44 46 32 60" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
  <path d="M32 4 Q20 18 20 32 Q20 46 32 60" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
  <!-- Equator -->
  <line x1="4" y1="32" x2="60" y2="32" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
  <!-- Shine -->
  <ellipse cx="24" cy="22" rx="8" ry="5" fill="rgba(255,255,255,0.18)" transform="rotate(-20 24 22)"/>
  <!-- Border -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
</svg>
