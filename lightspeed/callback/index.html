<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authorization Complete</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin: 0 0 8px; color: #111; }
    p { color: #555; margin: 0 0 24px; line-height: 1.5; }
    .code-box {
      background: #f0f0f0;
      border-radius: 8px;
      padding: 16px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      text-align: left;
      margin-bottom: 16px;
      border: 1px solid #ddd;
    }
    .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .copy-btn {
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }
    .copy-btn:hover { background: #333; }
    .error { color: #c00; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="success-view">
      <div class="icon">✅</div>
      <h1>Authorization Complete</h1>
      <p>Lightspeed account connected successfully. Copy the code below and send it to Josh.</p>
      <div class="label">Authorization Code</div>
      <div class="code-box" id="code-display">Loading...</div>
      <button class="copy-btn" onclick="copyCode()">Copy Code</button>
    </div>
    <div id="error-view" class="hidden">
      <div class="icon">❌</div>
      <h1>Authorization Failed</h1>
      <p class="error" id="error-message"></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const errorDescription = params.get('error_description');

    if (error) {
      document.getElementById('success-view').classList.add('hidden');
      document.getElementById('error-view').classList.remove('hidden');
      document.getElementById('error-message').textContent = errorDescription || error;
    } else if (code) {
      document.getElementById('code-display').textContent = code;
    } else {
      document.getElementById('success-view').classList.add('hidden');
      document.getElementById('error-view').classList.remove('hidden');
      document.getElementById('error-message').textContent = 'No authorization code found in URL.';
    }

    function copyCode() {
      const code = document.getElementById('code-display').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Code', 2000);
      });
    }
  </script>
</body>
</html>
